<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="696" viewBox="0 0 1600 696" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">reminder_sent 字段状态转换</text>
  <text x="16" y="52">触发条件</text>
  <text x="16" y="88">变化方向</text>
  <text x="16" y="124">执行函数</text>
  <text x="16" y="160">提醒时间到达，弹窗已展示</text>
  <text x="16" y="196">False → True</text>
  <text x="16" y="232">mark_reminders_sent()</text>
  <text x="16" y="268">用户修改 remind_at 字段</text>
  <text x="16" y="304">True → False</text>
  <text x="16" y="340">update_task() 内部重置</text>
  <text x="16" y="376">任务被标记为完成</text>
  <text x="16" y="412">False → True</text>
  <text x="16" y="448">_set_completion_state()</text>
  <text x="16" y="484">用户点击「延期」</text>
  <text x="16" y="520">True → False</text>
  <text x="16" y="556">postpone_reminder()</text>
  <text x="16" y="592">父节点刷新（_refresh_parent_chain）</text>
  <text x="16" y="628">无变化（隔离）</text>
  <text x="16" y="664">—</text>
</svg>


