<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" rx="16" fill="url(#bgGrad)"/>

  <!-- Ambient glow orbs -->
  <circle cx="180" cy="130" r="140" fill="#6366f1" opacity="0.07"/>
  <circle cx="1020" cy="130" r="120" fill="#0ea5e9" opacity="0.07"/>
  <circle cx="600" cy="260" r="100" fill="#34d399" opacity="0.06"/>
  <circle cx="600" cy="0" r="80" fill="#a78bfa" opacity="0.06"/>

  <!-- Star particles -->
  <circle cx="60"   cy="40"  r="1.5" fill="white" opacity="0.50"/>
  <circle cx="140"  cy="20"  r="1"   fill="white" opacity="0.35"/>
  <circle cx="240"  cy="70"  r="2"   fill="white" opacity="0.30"/>
  <circle cx="420"  cy="30"  r="1.5" fill="white" opacity="0.40"/>
  <circle cx="700"  cy="20"  r="1"   fill="white" opacity="0.45"/>
  <circle cx="850"  cy="50"  r="2"   fill="white" opacity="0.30"/>
  <circle cx="960"  cy="25"  r="1.5" fill="white" opacity="0.40"/>
  <circle cx="1090" cy="60"  r="1"   fill="white" opacity="0.35"/>
  <circle cx="1160" cy="35"  r="2"   fill="white" opacity="0.30"/>
  <circle cx="100"  cy="210" r="1"   fill="white" opacity="0.20"/>
  <circle cx="350"  cy="230" r="1.5" fill="white" opacity="0.20"/>
  <circle cx="1100" cy="200" r="1"   fill="white" opacity="0.20"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="130" x2="1200" y2="130" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="260" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Lightning bolt icon (left decorative) -->
  <text x="148" y="148" text-anchor="middle" font-size="64" fill="#a78bfa" opacity="0.25" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">⚡</text>

  <!-- Main Title -->
  <text x="600" y="118"
        text-anchor="middle"
        font-family="'SF Pro Display', 'Segoe UI', 'PingFang SC', system-ui, Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-1"
        fill="url(#titleGrad)"
        filter="url(#glow)">Task Forge</text>

  <!-- Divider line -->
  <line x1="240" y1="137" x2="960" y2="137" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="170"
        text-anchor="middle"
        font-family="'SF Pro Display', 'Segoe UI', 'PingFang SC', system-ui, Arial, sans-serif"
        font-size="18" font-weight="400" letter-spacing="2.5"
        fill="#94a3b8">本地优先任务工程系统 · Local-First · Offline-Complete · AI-Ready</text>

  <!-- Tech stack pills -->
  <!-- PyQt6 -->
  <rect x="318" y="200" width="88" height="26" rx="13" fill="#6366f1" opacity="0.88"/>
  <text x="362" y="218" text-anchor="middle" font-family="'Consolas', 'Menlo', monospace" font-size="12" fill="white" font-weight="600">PyQt6 6.6</text>

  <!-- SQLAlchemy -->
  <rect x="418" y="200" width="126" height="26" rx="13" fill="#0369a1" opacity="0.88"/>
  <text x="481" y="218" text-anchor="middle" font-family="'Consolas', 'Menlo', monospace" font-size="12" fill="white" font-weight="600">SQLAlchemy 2.0</text>

  <!-- SQLite -->
  <rect x="556" y="200" width="86" height="26" rx="13" fill="#065f46" opacity="0.88"/>
  <text x="599" y="218" text-anchor="middle" font-family="'Consolas', 'Menlo', monospace" font-size="12" fill="#6ee7b7" font-weight="600">SQLite 3</text>

  <!-- Python -->
  <rect x="654" y="200" width="108" height="26" rx="13" fill="#78350f" opacity="0.88"/>
  <text x="708" y="218" text-anchor="middle" font-family="'Consolas', 'Menlo', monospace" font-size="12" fill="#fcd34d" font-weight="600">Python 3.13</text>

  <!-- pytest -->
  <rect x="774" y="200" width="74" height="26" rx="13" fill="#1e1b4b" opacity="0.88" stroke="#4f46e5" stroke-width="1"/>
  <text x="811" y="218" text-anchor="middle" font-family="'Consolas', 'Menlo', monospace" font-size="12" fill="#a5b4fc" font-weight="600">pytest</text>

  <!-- Bottom subtle gradient overlay -->
  <rect x="0" y="240" width="1200" height="20" rx="0" fill="url(#bgGrad)" opacity="0.5"/>
</svg>
