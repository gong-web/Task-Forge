<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="140" viewBox="0 0 1600 140" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">父任务完成状态为什么没有自动更新？</text>
  <text x="16" y="52">`_refresh_parent_chain` 仅在子任务完成状态通过 `toggle_task()` 或 `batch_toggle_tasks()`</text>
  <text x="16" y="70">变化时触发。若通过非标准方式（如直接写数据库）完成子任务，父节点不会自动刷新。**请始终通过 `DB` 类接口操作数据。**</text>
</svg>


