<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="140" viewBox="0 0 1600 140" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">首次启动为什么会有短暂延迟？</text>
  <text x="16" y="52">启动时 `_ensure_schema()` 执行 schema 检查，`seed_database_if_empty()` 在空库情况下植入演示数据。两个操作均为幂等，通常在 1</text>
  <text x="16" y="70">秒内完成。后续启动仅执行备份操作，速度更快。</text>
</svg>


