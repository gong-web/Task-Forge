<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="174" viewBox="0 0 1600 174" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">如何在演示场景下快速重置到初始状态？</text>
  <text x="16" y="52">```powershell</text>
  <text x="16" y="70"># 关闭应用后执行</text>
  <text x="16" y="88">Remove-Item data/task_forge.db -Force</text>
  <text x="16" y="106"># 下次启动 seed_database_if_empty() 将自动植入完整演示数据</text>
  <text x="16" y="124">python src/main.py</text>
  <text x="16" y="142">```</text>
</svg>


