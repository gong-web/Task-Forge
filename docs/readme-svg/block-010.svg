<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="624" viewBox="0 0 1600 624" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">_refresh_parent_chain — 状态转换</text>
  <text x="16" y="52">状态</text>
  <text x="16" y="88">条件</text>
  <text x="16" y="124">转换方向</text>
  <text x="16" y="160">未完成</text>
  <text x="16" y="196">completed=False</text>
  <text x="16" y="232">→ 部分完成（子节点进度 &lt; 100%）</text>
  <text x="16" y="268">部分完成</text>
  <text x="16" y="304">progress &lt; 100%</text>
  <text x="16" y="340">→ 全部完成（全部子节点 completed=True）</text>
  <text x="16" y="376">全部完成</text>
  <text x="16" y="412">all children done</text>
  <text x="16" y="448">→ 父节点归档（completed=True，写入 completed_at）</text>
  <text x="16" y="484">回退</text>
  <text x="16" y="520">任意子节点取消完成</text>
  <text x="16" y="556">→ 强制回退 completed=False，向上递归至树根</text>
  <text x="16" y="592">隔离约束：reminder_sent 字段不受父节点刷新影响，保持原有锁状态</text>
</svg>


