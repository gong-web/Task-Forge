<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="444" viewBox="0 0 1600 444" preserveAspectRatio="xMinYMin meet">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style><![CDATA[
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif; font-size:11px; fill: #111; }
  ]]></style>
  <text x="16" y="16">提醒调度时序</text>
  <text x="16" y="52">提醒定时器</text>
  <text x="16" y="70">Single-shot</text>
  <text x="16" y="106">MainWindow</text>
  <text x="16" y="142">DB.py</text>
  <text x="16" y="178">声音引擎</text>
  <text x="16" y="214">提醒弹窗</text>
  <text x="16" y="250">① timeout() → check_reminders()</text>
  <text x="16" y="286">② MW → DB: due_reminders(current_time) → 返回待提醒任务列表</text>
  <text x="16" y="322">③ [存在待提醒任务] → 声音引擎: _play_reminder_sound() → DB: mark_reminders_sent(task_ids) → 弹窗:</text>
  <text x="16" y="340">_show_reminder_dialog(tasks)</text>
  <text x="16" y="376">④ [用户选择延期] → DB: postpone_reminder(task_id, minutes)（重置 reminder_sent=False）</text>
  <text x="16" y="412">⑤ MW → DB: next_pending_reminder_at() → 定时器: setSingleShot(True); start(delta_ms)</text>
</svg>


